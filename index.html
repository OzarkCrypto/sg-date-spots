<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG Date Spots</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8; --dark: #1A1A1A; --accent: #E8604A;
    --muted: #8A8070; --card-bg: #FFFFFF; --green: #4A7C59; --blue: #3D6A8A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); color: var(--dark); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1000; opacity: 0.4; }
  header { padding: 48px 32px 32px; text-align: center; }
  .eyebrow { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 6vw, 4rem); line-height: 1.1; color: var(--dark); margin-bottom: 8px; }
  h1 em { color: var(--accent); font-style: italic; }
  .subtitle { color: var(--muted); font-size: 0.95rem; font-weight: 300; margin-top: 8px; }
  .tabs { display: flex; justify-content: center; gap: 8px; padding: 24px 32px 0; flex-wrap: wrap; }
  .tab { padding: 10px 22px; border-radius: 100px; border: 1.5px solid #D4C9B8; background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; color: var(--muted); transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
  .tab:hover { border-color: var(--dark); color: var(--dark); transform: translateY(-1px); }
  .tab.active { background: var(--dark); border-color: var(--dark); color: var(--cream); }
  .main { max-width: 680px; margin: 40px auto; padding: 0 24px; }
  .card-wrapper { position: relative; min-height: 420px; }
  .card-stack { position: absolute; inset: 0; top: 12px; }
  .card-stack::before { content: ''; position: absolute; inset: 0; background: #E8E0D4; border-radius: 20px; transform: rotate(2deg) translateY(6px); z-index: 0; }
  .card-stack::after { content: ''; position: absolute; inset: 0; background: #EDE7DC; border-radius: 20px; transform: rotate(-1.5deg) translateY(3px); z-index: 1; }
  .card { position: relative; z-index: 2; background: var(--card-bg); border-radius: 20px; padding: 40px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes cardIn { from { opacity: 0; transform: scale(0.93) translateY(10px) rotate(-1deg); } to { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); } }
  .card-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; margin-bottom: 20px; }
  .tag-indoor { background: #EDF4F0; color: var(--green); }
  .tag-outdoor { background: #FFF3E0; color: #D4830A; }
  .tag-restaurant { background: #FDF0EE; color: var(--accent); }
  .tag-bar { background: #EEF2F8; color: var(--blue); }
  .card-name { font-family: 'Playfair Display', serif; font-size: 2rem; line-height: 1.2; margin-bottom: 6px; color: var(--dark); }
  .card-area { color: var(--muted); font-size: 0.88rem; margin-bottom: 20px; display: flex; align-items: center; gap: 5px; }
  .divider { height: 1px; background: linear-gradient(to right, #E8E0D4, transparent); margin: 20px 0; }
  .card-desc { font-size: 0.95rem; line-height: 1.7; color: #555; margin-bottom: 24px; }
  .card-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
  .meta-item { display: flex; align-items: center; gap: 6px; font-size: 0.83rem; color: var(--muted); background: var(--cream); padding: 6px 12px; border-radius: 8px; }
  .meta-item strong { color: var(--dark); font-weight: 500; }
  .vibe-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
  .vibe-tag { font-size: 0.78rem; padding: 4px 10px; border: 1px solid #E0D8CE; border-radius: 100px; color: var(--muted); }
  .spin-btn { width: 100%; padding: 16px; background: var(--dark); color: var(--cream); border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s ease; }
  .spin-btn:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232, 96, 74, 0.3); }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn .dice { font-size: 1.2rem; transition: transform 0.3s ease; }
  .spin-btn:hover .dice { transform: rotate(180deg); }
  .count-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 8px; }
  .count-label { font-size: 0.8rem; color: var(--muted); }
  .count-dots { display: flex; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #D4C9B8; transition: all 0.2s ease; }
  .dot.active { background: var(--dark); width: 18px; border-radius: 3px; }
  footer { text-align: center; padding: 32px; color: var(--muted); font-size: 0.8rem; }
  footer span { color: var(--accent); }
</style>
</head>
<body>
<header>
  <p class="eyebrow">Singapore</p>
  <h1>Where to go<br><em>tonight?</em></h1>
  <p class="subtitle">Pick a vibe, spin the wheel</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="setCategory('indoor')" id="tab-indoor"><span>indoor</span></button>
  <button class="tab" onclick="setCategory('outdoor')" id="tab-outdoor"><span>outdoor</span></button>
  <button class="tab" onclick="setCategory('restaurant')" id="tab-restaurant"><span>restaurant</span></button>
  <button class="tab" onclick="setCategory('bar')" id="tab-bar"><span>bar</span></button>
</div>
<div class="main">
  <div class="count-row">
    <span class="count-label" id="count-label">1 of 5</span>
    <div class="count-dots" id="count-dots"></div>
  </div>
  <div class="card-wrapper">
    <div class="card-stack"></div>
    <div class="card" id="main-card"></div>
  </div>
</div>
<footer>Made with <span>love</span> for SG date nights</footer>
<script>
const data = {
  indoor: [
    { name: "Cloud Forest", area: "Gardens by the Bay", desc: "Air-con paradise with a 35m indoor waterfall. One of the best photo spots in all of Singapore.", price: "SGD 53 (combo)", hours: "9AM - 9PM", vibes: ["romantic", "photo-worthy", "cool", "nature"] },
    { name: "ArtScience Museum", area: "Marina Bay Sands", desc: "teamLab digital art exhibit. The Crystal Universe section guarantees amazing shots for both of you.", price: "SGD 19-25", hours: "10AM - 7PM", vibes: ["art", "instagrammable", "dreamy", "unique"] },
    { name: "Flower Dome", area: "Gardens by the Bay", desc: "One of the world's largest glass greenhouses. Mediterranean plants and seasonal flowers - she'll love it.", price: "SGD 53 (combo)", hours: "9AM - 9PM", vibes: ["flowers", "romantic", "cool", "beautiful"] },
    { name: "Motion Art Space", area: "Arab Street", desc: "Make your own spin art on a spinning canvas. Take the artwork home as a keepsake together.", price: "SGD 45/pax", hours: "10AM - 7PM", vibes: ["hands-on", "couple activity", "unique", "keepsake"] },
    { name: "National Museum of Singapore", area: "Dhoby Ghaut", desc: "Singapore's national museum. Permanent galleries are free. Great air-con and lots to see.", price: "Free (permanent)", hours: "10AM - 7PM", vibes: ["culture", "free", "air-con", "history"] }
  ],
  outdoor: [
    { name: "Marina Bay Promenade", area: "Marina Bay", desc: "MBS, Singapore Flyer, and the CBD skyline all in one view. Magical at golden hour and even better at night.", price: "Free", hours: "24hrs", vibes: ["skyline", "walking", "romantic", "free"] },
    { name: "Sentosa Tanjong Beach", area: "Sentosa Island", desc: "Singapore's most laid-back beach. Quiet enough to just sit with drinks and watch the sunset together.", price: "Free (transport extra)", hours: "24hrs", vibes: ["beach", "chill", "quiet", "sunset"] },
    { name: "Henderson Waves", area: "Telok Blangah", desc: "Singapore's highest pedestrian bridge. Go around golden hour - the warm lighting transforms the whole place.", price: "Free", hours: "24hrs", vibes: ["skyline", "walk", "free", "unique"] },
    { name: "Fort Canning Park", area: "Dhoby Ghaut", desc: "Historic hilltop park. Quiet and atmospheric in the evenings with great backdrops for photos.", price: "Free", hours: "24hrs", vibes: ["history", "walk", "quiet", "photo spots"] },
    { name: "Southern Ridges", area: "Telok Blangah", desc: "9km nature trail connecting to Henderson Waves. Go after 5pm for cool breezes and forest vibes.", price: "Free", hours: "24hrs", vibes: ["trekking", "nature", "free", "adventure"] }
  ],
  restaurant: [
    { name: "Merci Marcel", area: "Orchard / Tiong Bahru", desc: "French all-day cafe from brunch to dinner. Romantic outdoor seating. The ravioli and steak are incredible. 4.7", price: "SGD 30-50/pax", hours: "8AM - 10:30PM", vibes: ["french", "brunch", "al fresco", "vibes"] },
    { name: "Sol & Luna", area: "CapitaSpring 17F", desc: "17th floor restaurant with CBD views. Fresh pasta is the signature. Happy Hour 4-8pm for wine and beer. 4.2", price: "SGD 50-80/pax", hours: "11AM - 11PM", vibes: ["CBD view", "italian", "romantic", "happy hour"] },
    { name: "Marguerite", area: "Flower Dome, Gardens by the Bay", desc: "Michelin star restaurant inside the Flower Dome. Dining surrounded by a garden. Perfect for special occasions. 4.6", price: "SGD 150+/pax", hours: "Thu-Sun lunch/dinner", vibes: ["michelin", "fine dining", "special occasion", "garden view"] },
    { name: "Brunches Cafe", area: "Rangoon Road", desc: "Retro all-day brunch cafe. Great value and atmosphere. Occasional live music. 4.7", price: "SGD 25-40/pax", hours: "10AM - 10PM", vibes: ["retro", "brunch", "value", "atmosphere"] },
    { name: "Odette", area: "National Gallery", desc: "One of Singapore's finest dining experiences. Michelin 3-star. The ultimate choice for a special anniversary.", price: "SGD 250+/pax", hours: "Tue-Sat lunch/dinner", vibes: ["michelin 3-star", "fine dining", "anniversary", "french"] }
  ],
  bar: [
    { name: "VUE", area: "OUE Bayfront 19F", desc: "360-degree Marina Bay views from a rooftop bar. Cocktails with the skyline. Best couple bar in the city. 4.7", price: "SGD 20-30/drink", hours: "Mon-Sat from 5:30PM", vibes: ["rooftop", "skyline", "cocktails", "romantic"] },
    { name: "Atlas Bar", area: "Bugis", desc: "Art deco masterpiece with 1,000+ gin collection. The space itself is art - incredible photos guaranteed. 4.6", price: "SGD 22-35/drink", hours: "Mon-Sat from 3PM", vibes: ["art deco", "gin bar", "classic", "photo spot"] },
    { name: "Ce La Vi", area: "Marina Bay Sands 57F", desc: "Club & bar next to the MBS infinity pool on the 57th floor. Best views in Singapore. Smart casual dress code.", price: "SGD 25-40/drink", hours: "6PM - late", vibes: ["MBS views", "club", "skyline", "dress up"] },
    { name: "Smoke & Mirrors", area: "National Gallery 6F", desc: "Rooftop bar on the National Gallery. Padang lawn and CBD views simultaneously. Great cocktails, less crowded. 4.5", price: "SGD 20-30/drink", hours: "Tue-Sun from 5PM", vibes: ["rooftop", "cocktails", "views", "less crowded"] },
    { name: "Jigger & Pony", area: "Amara Hotel", desc: "Asia's 50 Best Bars perennial. Classic cocktail specialists. Understated but serious about craft. 4.6", price: "SGD 22-32/drink", hours: "Tue-Sun from 5PM", vibes: ["classic cocktails", "best bars asia", "craft", "sophisticated"] }
  ]
};

let currentCategory = 'indoor', currentIndex = 0, shuffled = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setCategory(cat) {
  currentCategory = cat;
  currentIndex = 0;
  shuffled = shuffle(data[cat]);
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + cat).classList.add('active');
  renderCard();
  renderDots();
}

function nextCard() {
  currentIndex = (currentIndex + 1) % shuffled.length;
  renderCard();
  renderDots();
}

function renderDots() {
  const dots = document.getElementById('count-dots');
  dots.innerHTML = '';
  for (let i = 0; i < shuffled.length; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentIndex ? ' active' : '');
    dots.appendChild(d);
  }
  document.getElementById('count-label').textContent = (currentIndex + 1) + ' of ' + shuffled.length;
}

const tagClass = { indoor: 'tag-indoor', outdoor: 'tag-outdoor', restaurant: 'tag-restaurant', bar: 'tag-bar' };
const tagLabel = { indoor: 'Indoor Activity', outdoor: 'Outdoor Activity', restaurant: 'Restaurant', bar: 'Bar' };

function renderCard() {
  const spot = shuffled[currentIndex];
  const card = document.getElementById('main-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';
  card.innerHTML =
    '<div class="card-tag ' + tagClass[currentCategory] + '">' + tagLabel[currentCategory] + '</div>' +
    '<div class="card-name">' + spot.name + '</div>' +
    '<div class="card-area">@ ' + spot.area + '</div>' +
    '<div class="divider"></div>' +
    '<p class="card-desc">' + spot.desc + '</p>' +
    '<div class="card-meta">' +
      '<div class="meta-item">$ <strong>' + spot.price + '</strong></div>' +
      '<div class="meta-item">Hours: <strong>' + spot.hours + '</strong></div>' +
    '</div>' +
    '<div class="vibe-tags">' + spot.vibes.map(v => '<span class="vibe-tag">' + v + '</span>').join('') + '</div>' +
    '<button class="spin-btn" onclick="nextCard()"><span class="dice">&#127922;</span> Show me another</button>';
}

setCategory('indoor');
</script>
</body>
</html>
